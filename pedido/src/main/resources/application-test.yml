server:
  port: 8867 # Un puerto cualquiera solo para los tests

spring:
  application:
    name: microservicio-pedido-test
  datasource:
    # Usamos una base de datos en memoria limpia y exclusiva para pruebas5
    url: jdbc:h2:mem:db_pedido_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true # Flyway sigue armando las tablas para que el test tenga dónde mirar