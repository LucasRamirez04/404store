spring.application.name=pedido
server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/db_404store_pedido
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.root=INFO
logging.level._store.pedido=INFO
logging.file.name=logs/pedido.log

#Url base del cliente-service
cliente-service.url=http://localhost:8081/api/store/clientes

#Url base del producto-service
producto-service.url=http://localhost:8082/api/store/productos

#Url base del pago-service
pago-service.url=http://localhost:8084/api/store/pagos