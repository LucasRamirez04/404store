server:
  port: 8083

spring:
  application:
    name: microservicio-pedido
  datasource:
    url: jdbc:mysql://mysql-db:3306/db_404store?createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    preferIpAddress: true

cliente-service:
  url: http://microservicio-cliente:8081

producto-service:
  url: http://microservicio-producto:8082

pago-service:
  url: http://microservicio-pago:8084