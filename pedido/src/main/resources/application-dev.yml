server:
  port: 8083
spring:
  application:
    name: microservicio-pedido
  datasource:
    url: jdbc:h2:mem:db_404store_pedido;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: true
    baseline-on-migrate: true
  # application-dev.yml
cliente-service:
  url: http://localhost:8081

producto-service:
  url: http://localhost:8082

pago-service:
  url: http://localhost:8084