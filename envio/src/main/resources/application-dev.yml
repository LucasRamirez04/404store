server:
  port: 8085

spring:
  application:
    name: envio
  datasource:
    url: jdbc:h2:mem:db_404store_envio;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true

pedido-service:
  url: http://localhost:8083/api/store/pedidos
