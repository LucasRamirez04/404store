server:
  port: 8085


spring:
  application:
    name: microservicio-envio
  datasource:
    url: jdbc:mysql://mysql-db:3306/db_404store?createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: "system"
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true


eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    preferIpAddress: true

pedido-service:
  url: http://localhost:8083/api/store/pedidos
