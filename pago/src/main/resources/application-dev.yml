server:
  port: 8084

spring:
  application:
    name: microservicio-pago
  datasource:
    url: jdbc:mysql://mysql-db:3306/db_404store?createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    preferIpAddress: true

pedido-service:
  url: http://microservicio-pedido:8083

envio-service:
  url: http://microservicio-envio:8085