server:
  port: 8869

spring:
  application:
    name: microservicio-inventario-test
  datasource:
    url: jdbc:h2:mem:db_inventario_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false

eureka:
  client:
    enabled: false

producto-service:
  url: http://localhost:8082/api/store/productos