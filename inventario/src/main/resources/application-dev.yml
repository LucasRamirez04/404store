server:
  port: 8088

spring:
  application:
    name: microservicio-inventario
  datasource:
    url: jdbc:mysql://localhost:3306/db_404store_inventario?createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

producto-service:
  url: http://localhost:8082/api/store/productos