server:
  port: 8086

spring:
  application:
    name: microservicio-notificacion
  datasource:
    url: jdbc:mysql://localhost:3306/db_404store_notificacion
    username: root
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true
  instance:
    preferIpAddress: true

logging:
  level:
    root: INFO
    _store.notificacion: INFO
  file:
    name: logs/notificacion.log