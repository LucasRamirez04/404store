server:
  port: ${PORT}

spring:
  application:
    name: microservicio-resena
  datasource:
    url: jdbc:${DB_URL}
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL}
    fetch-registry: false
    register-with-eureka: true
    eureka-server-connect-timeout-seconds: 5
    eureka-server-read-timeout-seconds: 5
  instance:
    preferIpAddress: true

cliente-service:
  url: ""

producto-service:
  url: ""
